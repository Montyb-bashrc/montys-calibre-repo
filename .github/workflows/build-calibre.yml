name: Build and Sign Calibre Repo

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Bauplatz einrichten
        uses: actions/checkout@v4

      - name: Werkzeugkiste holen (Abhängigkeiten)
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils curl tar binutils

      - name: Türsteher wecken (GPG Key laden & ID sichern)
        run: |
          # Den privaten Key importieren
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          
          # Wir holen uns die echte Key-ID direkt aus dem System
          # Das ist sicherer als die Mailadresse zu nutzen
          RAW_KEY_ID=$(gpg --list-secret-keys --with-colons | grep "^sec" | cut -d: -f5)
          echo "MY_KEY_ID=$RAW_KEY_ID" >> $GITHUB_ENV
          
          # Dem Key blind vertrauen
          echo -e "5\ny\n" | gpg --batch --command-fd 0 --expert --edit-key $RAW_KEY_ID trust

      - name: Calibre saugen und als .deb einwickeln
        run: |
          mkdir -p build/opt/calibre build/usr/bin build/DEBIAN
          curl -L -o calibre.tar.xz "https://calibre-ebook.com/dist/linux64"
          tar xf calibre.tar.xz -C build/opt/calibre
          ln -s /opt/calibre/calibre build/usr/bin/calibre
          cat <<EOF > build/DEBIAN/control
          Package: montys-calibre
          Version: $(date +'%Y.%m.%d')
          Architecture: amd64
          Maintainer: Keules Calibre <sascha@montyb.de>
          Description: Das frischeste Calibre, direkt vom Fließband
          EOF
          dpkg-deb --build build montys-calibre.deb

      - name: Apt-Repository basteln und stempeln
        run: |
          mkdir -p repo
          mv montys-calibre.deb repo/
          cd repo
          touch .nojekyll
          
          dpkg-scanpackages . /dev/null > Packages
          gzip -9c Packages > Packages.gz
          apt-ftparchive -o APT::FTPArchive::Release::Architectures="amd64" release . > Release
          
          # HIER DER TRICK: Wir nutzen die Key-ID aus der Umgebungsvariable
          gpg --batch --yes --local-user ${{ env.MY_KEY_ID }} -abs -o Release.gpg Release
          gpg --batch --yes --local-user ${{ env.MY_KEY_ID }} --clearsign -o InRelease Release

      - name: Paket auf die Laderampe stellen
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo/

      - name: Ab ins Schaufenster (Deploy to GitHub Pages)
        uses: actions/deploy-pages@v4
